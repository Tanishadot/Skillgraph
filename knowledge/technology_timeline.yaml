# Technology Timeline Knowledge Base
# Each entry drives experience plausibility checks in jd_validator.py.
#
# Fields:
#   introduced:  year the technology was first publicly released
#   mainstream:  year when broad industry adoption began (used for max-plausible calc)
#   category:    machine-readable group (used for skill-overload + transferable-skills)
#   aliases:     alternative names that map to this entry
#   learning_curve_months: typical time for a competent engineer to become proficient
#   notes:       context for the reasoning string shown to recruiters
#
# Max plausible experience is calculated at runtime as:
#   max_plausible = current_year - mainstream + 1
# Add new technologies here; no code changes needed.

